<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Мой Сейф</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth" style="text-align:center; margin-top:50px;">
        <h2>🔐 Вход</h2>
        <input type="password" id="p" placeholder="Пароль...">
        <button onclick="login()">ВОЙТИ</button>
    </div>

    <div id="app" style="display:none">
        <h1>🔒 Личное Облако</h1>
        <div style="border:1px solid #555; padding:15px; border-radius:10px; background:#1e272e">
            <input id="t" placeholder="Заголовок">
            <textarea id="c" placeholder="Текст или ссылка"></textarea>
            <select id="y">
                <option value="note">📝 Заметка</option>
                <option value="link">🔗 Ссылка</option>
            </select>
            <button onclick="add()" id="btn" style="background:green; width:100%">СОХРАНИТЬ</button>
        </div>
        <div id="status" style="margin:10px 0; color:#3498db; text-align:center"></div>
        <div id="list"></div>
    </div>

    <script>
        const URL = "https://pokndnygducdizmuajek.supabase.co";
        const KEY = "sb_publishable_38t8s0j-MLQnwgQDfH471w_M7hDZCdt";
        const PASS = "1234"; 

        const sb = supabase.createClient(URL, KEY);

        function login() {
            if (document.getElementById('p').value === PASS) {
                document.getElementById('auth').style.display='none';
                document.getElementById('app').style.display='block';
                show();
            } else { alert("Неверно!"); }
        }

        async function add() {
            const title = document.getElementById('t').value;
            const content = document.getElementById('c').value;
            const type = document.getElementById('y').value;
            const btn = document.getElementById('btn');

            if(!title || !content) return alert("Заполни все поля!");

            btn.disabled = true;
            document.getElementById('status').innerText = "⏳ Сохранение...";

            // Отправляем данные в таблицу
            const { error } = await sb.from('my_vault').insert([{ title, content, type }]);

            if(error) {
                alert("ОШИБКА: " + error.message);
                document.getElementById('status').innerText = "❌ Ошибка";
            } else {
                document.getElementById('t').value = '';
                document.getElementById('c').value = '';
                document.getElementById('status').innerText = "✅ Успешно сохранено!";
                show();
            }
            btn.disabled = false;
        }

        async function show() {
            const { data, error } = await sb.from('my_vault').select('*').order('id', {ascending: false});
            const out = document.getElementById('list');
            if (error) {
                out.innerHTML = "Ошибка загрузки: " + error.message;
                return;
            }
            out.innerHTML = "";
            data.forEach(i => {
                out.innerHTML += `
                <div style="border:1px solid #444; padding:15px; margin-top:10px; border-radius:8px; background:#2c3e50">
                    <button onclick="del(${i.id})" style="float:right; background:red; padding:2px 8px;">🗑</button>
                    <strong style="color:#3498db">${i.title}</strong><br>
                    <div style="margin-top:10px">${i.type === 'note' ? i.content : '<a href="'+i.content+'" target="_blank">Открыть ссылку ↗</a>'}</div>
                </div>`;
            });
        }

        async function del(id) {
            if(confirm("Удалить?")) {
                await sb.from('my_vault').delete().eq('id', id);
                show();
            }
        }
    </script>
</body>
</html>
