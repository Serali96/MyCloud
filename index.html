<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой Облачный Сейф</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div id="loginBlock" style="text-align: center; margin-top: 100px;">
        <div style="border: 1px solid #444; padding: 20px; border-radius: 12px; background: #1e272e;">
            <h2>🔓 Вход в облако</h2>
            <input type="password" id="passInput" placeholder="Введите пароль...">
            <button onclick="checkPassword()">Войти</button>
        </div>
    </div>

    <div id="mainContent" style="display: none;">
        <h1>🔒 Мое Хранилище</h1>
        <button onclick="location.reload()" style="width: auto; float: right;">Выйти</button>
        
        <div style="border: 1px solid #444; padding: 20px; border-radius: 12px; margin-bottom: 20px;">
            <h3>➕ Новая запись</h3>
            <select id="dataType">
                <option value="note">📝 Заметка</option>
                <option value="link">🔗 Ссылка/Файл</option>
            </select>
            <input type="text" id="dataTitle" placeholder="Заголовок">
            <textarea id="dataContent" placeholder="Текст или ссылка"></textarea>
            <button id="saveBtn" onclick="saveData()">Сохранить в облако</button>
        </div>

        <div id="displayArea">Загрузка данных...</div>
    </div>

    <script>
        // Твои настройки (уже вставлены)
        const SB_URL = "https://pokndnygducdizmuajek.supabase.co";
        const SB_KEY = "sb_publishable_38t8s0j-MLQnwgQDfH471w_M7hDZCdt";
        const SECRET_PASSWORD = "201595sA!@"; // Если менял пароль, исправь здесь

        // Инициализация клиента
        const supabase = Object.assign(window.supabase.createClient(SB_URL, SB_KEY));

        function checkPassword() {
            const entered = document.getElementById('passInput').value;
            console.log("Попытка входа..."); // Для проверки в консоли
            
            if (entered === SECRET_PASSWORD) {
                document.getElementById('loginBlock').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadData();
            } else {
                alert("Пароль неверный!");
            }
        }

        async function saveData() {
            const type = document.getElementById('dataType').value;
            const title = document.getElementById('dataTitle').value;
            const content = document.getElementById('dataContent').value;

            if(!title || !content) return alert("Заполни все поля");

            const { error } = await supabase
                .from('my_vault')
                .insert([{ type, title, content }]);

            if (error) {
                alert("Ошибка базы данных: " + error.message);
                console.error(error);
            } else {
                document.getElementById('dataTitle').value = "";
                document.getElementById('dataContent').value = "";
                loadData();
            }
        }

        async function loadData() {
            const area = document.getElementById('displayArea');
            let { data: notes, error } = await supabase
                .from('my_vault')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                area.innerHTML = "<p style='color:red'>Ошибка загрузки: " + error.message + ". Проверьте, создана ли таблица в SQL Editor!</p>";
                return;
            }

            area.innerHTML = "";
            if (notes.length === 0) area.innerHTML = "Пока ничего не сохранено.";

            notes.forEach(item => {
                const body = (item.type === 'note') 
                    ? `<p>${item.content}</p>` 
                    : `<p><a href="${item.content}" target="_blank">Открыть ссылку ↗</a></p>`;
                
                area.innerHTML += `
                    <div style="border: 1px solid #444; padding: 15px; border-radius: 10px; margin-bottom: 10px;">
                        <button onclick="deleteItem(${item.id})" style="float:right; width:auto; background:red;">🗑</button>
                        <strong>${item.title}</strong>
                        ${body}
                    </div>`;
            });
        }

        async function deleteItem(id) {
            if(!confirm("Удалить?")) return;
            await supabase.from('my_vault').delete().eq('id', id);
            loadData();
        }
    </script>
</body>
</html>
